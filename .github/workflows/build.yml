name: Build Standalone

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      python_version:
        description: "python-build-standalone version (e.g. 3.13.3)"
        required: false
        default: "3.13.3"
      pbs_tag:
        description: "python-build-standalone release tag (e.g. 20250409)"
        required: false
        default: "20250409"

env:
  PYTHON_VERSION: ${{ inputs.python_version || '3.13.3' }}
  PBS_TAG: ${{ inputs.pbs_tag || '20250409' }}
  # Must match `productName` in src-tauri/tauri.conf.json
  APP_PRODUCT_NAME: gera

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x86_64
            os: ubuntu-22.04
            py_arch: x86_64-unknown-linux-gnu
            rust_target: x86_64-unknown-linux-gnu
            py_bin: bin/python3

          - platform: linux-aarch64
            os: ubuntu-22.04-arm
            py_arch: aarch64-unknown-linux-gnu
            rust_target: aarch64-unknown-linux-gnu
            py_bin: bin/python3

          - platform: macos-x86_64
            os: macos-13
            py_arch: x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
            py_bin: bin/python3

          - platform: macos-aarch64
            os: macos-latest
            py_arch: aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
            py_bin: bin/python3

          - platform: windows-x86_64
            os: windows-latest
            py_arch: x86_64-pc-windows-msvc
            rust_target: x86_64-pc-windows-msvc
            py_bin: python.exe

    runs-on: ${{ matrix.os }}

    steps:
      # ------------------------------------------------------------------ #
      # Checkout
      # ------------------------------------------------------------------ #
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------ #
      # System dependencies
      # ------------------------------------------------------------------ #
      - name: Install Linux system dependencies
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config

      # ------------------------------------------------------------------ #
      # Language runtimes
      # ------------------------------------------------------------------ #
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust / Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          key: ${{ matrix.platform }}

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      # ------------------------------------------------------------------ #
      # Frontend dependencies
      # ------------------------------------------------------------------ #
      - name: Install Node/Bun dependencies
        run: bun install

      # ------------------------------------------------------------------ #
      # python-build-standalone (portable Python to bundle)
      # ------------------------------------------------------------------ #
      - name: Download python-build-standalone (Unix)
        if: runner.os != 'Windows'
        run: |
          FILENAME="cpython-${{ env.PYTHON_VERSION }}+${{ env.PBS_TAG }}-${{ matrix.py_arch }}-install_only_stripped.tar.gz"
          URL="https://github.com/indygreg/python-build-standalone/releases/download/${{ env.PBS_TAG }}/${FILENAME}"
          echo "Downloading ${URL}"
          curl -fsSL "${URL}" -o pyembed.tar.gz
          mkdir -p src-tauri/pyembed
          tar -xzf pyembed.tar.gz -C src-tauri/pyembed
          echo "Extracted layout:"
          ls src-tauri/pyembed/python/

      - name: Download python-build-standalone (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $filename = "cpython-${{ env.PYTHON_VERSION }}+${{ env.PBS_TAG }}-${{ matrix.py_arch }}-install_only_stripped.tar.gz"
          $url = "https://github.com/indygreg/python-build-standalone/releases/download/${{ env.PBS_TAG }}/$filename"
          Write-Host "Downloading $url"
          Invoke-WebRequest -Uri $url -OutFile pyembed.tar.gz
          New-Item -ItemType Directory -Force -Path src-tauri\pyembed | Out-Null
          tar -xzf pyembed.tar.gz -C src-tauri\pyembed
          Write-Host "Extracted layout:"
          Get-ChildItem src-tauri\pyembed\python\

      # ------------------------------------------------------------------ #
      # Patch macOS libpython install_name so @rpath works at runtime
      # See: https://github.com/pytauri/pytauri/issues/99#issuecomment-2704556726
      # ------------------------------------------------------------------ #
      - name: Patch libpython install_name (macOS)
        if: runner.os == 'macOS'
        run: |
          PYMAJ=$(echo "${{ env.PYTHON_VERSION }}" | cut -d. -f1-2)
          DYLIB="src-tauri/pyembed/python/lib/libpython${PYMAJ}.dylib"
          if [ -f "${DYLIB}" ]; then
            install_name_tool -id "@rpath/libpython${PYMAJ}.dylib" "${DYLIB}"
            echo "Patched install_name for ${DYLIB}"
          else
            echo "WARNING: ${DYLIB} not found — skipping patch"
          fi

      # ------------------------------------------------------------------ #
      # Install the Python project into the bundled interpreter
      # ------------------------------------------------------------------ #
      - name: Install Python project into pyembed (Unix)
        if: runner.os != 'Windows'
        env:
          PYTAURI_STANDALONE: "1"
        run: |
          uv pip install \
            --exact \
            --python="./src-tauri/pyembed/python/${{ matrix.py_bin }}" \
            --reinstall-package=gera \
            ./src-tauri

      - name: Install Python project into pyembed (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          PYTAURI_STANDALONE: "1"
        run: |
          uv pip install `
            --exact `
            --python=".\src-tauri\pyembed\python\${{ matrix.py_bin }}" `
            --reinstall-package=gera `
            .\src-tauri

      # ------------------------------------------------------------------ #
      # Configure pyo3 and RUSTFLAGS, then build
      # ------------------------------------------------------------------ #
      - name: Build standalone binary (Linux)
        if: runner.os == 'Linux'
        env:
          PYTAURI_STANDALONE: "1"
          PYO3_PYTHON: ${{ github.workspace }}/src-tauri/pyembed/python/bin/python3
          RUSTFLAGS: >-
            -C link-arg=-Wl,-rpath,$ORIGIN/../lib/${{ env.APP_PRODUCT_NAME }}/lib
            -L ${{ github.workspace }}/src-tauri/pyembed/python/lib
        run: |
          bunx tauri build \
            --config "src-tauri/tauri.bundle.json" \
            -- --profile bundle-release

      - name: Build standalone binary (macOS)
        if: runner.os == 'macOS'
        env:
          PYTAURI_STANDALONE: "1"
          PYO3_PYTHON: ${{ github.workspace }}/src-tauri/pyembed/python/bin/python3
          RUSTFLAGS: >-
            -C link-arg=-Wl,-rpath,@executable_path/../Resources/lib
            -L ${{ github.workspace }}/src-tauri/pyembed/python/lib
        run: |
          bunx tauri build \
            --config "src-tauri/tauri.bundle.json" \
            -- --profile bundle-release

      - name: Build standalone binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          PYTAURI_STANDALONE: "1"
        run: |
          $env:PYO3_PYTHON = (Resolve-Path -LiteralPath ".\src-tauri\pyembed\python\${{ matrix.py_bin }}").Path
          bunx tauri build `
            --config "src-tauri/tauri.bundle.json" `
            -- --profile bundle-release

      # ------------------------------------------------------------------ #
      # Upload artifacts
      # ------------------------------------------------------------------ #
      - name: Upload bundle artifacts (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: gera-${{ matrix.platform }}
          path: |
            target/bundle-release/bundle/deb/*.deb
            target/bundle-release/bundle/rpm/*.rpm
            target/bundle-release/bundle/appimage/*.AppImage
          if-no-files-found: warn

      - name: Upload bundle artifacts (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: gera-${{ matrix.platform }}
          path: |
            target/bundle-release/bundle/dmg/*.dmg
            target/bundle-release/bundle/macos/*.app
          if-no-files-found: warn

      - name: Upload bundle artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: gera-${{ matrix.platform }}
          path: |
            target/bundle-release/bundle/nsis/*.exe
            target/bundle-release/bundle/msi/*.msi
          if-no-files-found: warn

  # -------------------------------------------------------------------- #
  # Optional: attach artifacts to a GitHub Release on tag push
  # -------------------------------------------------------------------- #
  release:
    name: Attach to GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true